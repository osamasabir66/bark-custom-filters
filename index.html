<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BARK Lead Scorer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8f7f4; --surface: #ffffff; --surface-alt: #f2f1ee;
    --border: #e4e2dc; --text: #1a1a18; --text-secondary: #6b6a66; --text-muted: #9e9d99;
    --green: #3B6D11; --green-bg: #eaf3de; --green-border: #C0DD97;
    --amber: #854F0B; --amber-bg: #FAEEDA; --amber-border: #EF9F27;
    --red: #A32D2D; --red-bg: #FCEBEB; --red-border: #F7C1C1;
    --blue: #185FA5; --blue-bg: #E6F1FB; --blue-border: #85B7EB;
    --radius: 8px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 820px; margin: 0 auto; }
  header { margin-bottom: 1.5rem; }
  header h1 { font-size: 22px; font-weight: 600; }
  header p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

  /* Mode toggle */
  .mode-toggle { display: flex; gap: 8px; margin-bottom: 1.5rem; align-items: center; }
  .mode-toggle span { font-size: 12px; color: var(--text-muted); margin-right: 4px; }
  .mb { border: 0.5px solid var(--border); background: var(--surface); border-radius: 20px; padding: 6px 16px; font-size: 13px; color: var(--text-secondary); cursor: pointer; }
  .mb.active { background: var(--text); color: #fff; border-color: var(--text); }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 1.5rem; }
  .stat { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: .875rem 1rem; }
  .stat .num { font-size: 24px; font-weight: 600; }
  .stat .lbl { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .stat.buy .num { color: var(--green); }
  .stat.review .num { color: var(--amber); }
  .stat.skip .num { color: var(--red); }

  /* Filters */
  .filters { display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .fb { border: 0.5px solid var(--border); background: var(--surface); border-radius: 20px; padding: 6px 16px; font-size: 13px; color: var(--text-secondary); cursor: pointer; }
  .fb.active-all { background: #ededff; color: #3a35b0; border-color: #a09de0; }
  .fb.active-buy { background: var(--green-bg); color: var(--green); border-color: var(--green-border); }
  .fb.active-review { background: var(--amber-bg); color: var(--amber); border-color: var(--amber-border); }
  .fb.active-skip { background: var(--red-bg); color: var(--red); border-color: var(--red-border); }

  /* Lead cards */
  .leads { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.5rem; }
  .lead-card { background: var(--surface); border: 0.5px solid var(--border); border-left: 3px solid var(--border); border-radius: 12px; padding: 1.125rem 1.25rem; }
  .lead-card.buy { border-left-color: #639922; }
  .lead-card.review { border-left-color: #EF9F27; }
  .lead-card.skip { border-left-color: #E24B4A; }
  .lead-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: .75rem; }
  .lead-name { font-size: 15px; font-weight: 600; }
  .lead-meta { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
  .badge { font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 20px; white-space: nowrap; }
  .badge.buy { background: var(--green-bg); color: var(--green); }
  .badge.review { background: var(--amber-bg); color: var(--amber); }
  .badge.skip { background: var(--red-bg); color: var(--red); }
  .factors { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: .75rem; }
  .ftag { font-size: 11px; padding: 3px 9px; border-radius: 20px; background: var(--surface-alt); color: var(--text-secondary); border: 0.5px solid var(--border); }
  .ftag.pos { background: var(--green-bg); color: var(--green); border-color: var(--green-border); }
  .ftag.neg { background: var(--red-bg); color: var(--red); border-color: var(--red-border); }
  .lead-bottom { display: flex; justify-content: space-between; align-items: center; padding-top: .625rem; border-top: 0.5px solid var(--border); }
  .score-label { font-size: 12px; color: var(--text-muted); }
  .score-val { font-size: 18px; font-weight: 700; }
  .score-val.buy { color: var(--green); }
  .score-val.review { color: var(--amber); }
  .score-val.skip { color: var(--red); }
  .empty { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 13px; background: var(--surface); border-radius: 12px; border: 0.5px solid var(--border); }

  /* Scoring ref */
  .scoring-ref { margin-bottom: 1.5rem; background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; }
  .scoring-ref summary { font-size: 13px; font-weight: 600; color: var(--text-secondary); cursor: pointer; user-select: none; }
  .ref-table { width: 100%; margin-top: .75rem; border-collapse: collapse; font-size: 12px; }
  .ref-table td { padding: 5px 8px; border-bottom: 0.5px solid var(--border); }
  .ref-table td:last-child { text-align: right; font-weight: 600; }
  .ref-table tr:last-child td { border-bottom: none; }
  .pos-score { color: var(--green); } .neg-score { color: var(--red); }
  .rules { display: flex; gap: 1.5rem; margin-top: .75rem; font-size: 12px; flex-wrap: wrap; }

  /* Paste section */
  .paste-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 1.25rem; }
  .paste-card h2 { font-size: 15px; font-weight: 600; margin-bottom: .5rem; }
  .paste-card p { font-size: 12px; color: var(--text-muted); margin-bottom: .75rem; }
  .paste-card textarea { width: 100%; min-height: 120px; padding: 10px 12px; border: 0.5px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); font-size: 12px; font-family: monospace; resize: vertical; }
  .parse-btn { margin-top: 10px; width: 100%; padding: 9px; border: 0.5px solid var(--blue-border); border-radius: var(--radius); background: var(--blue-bg); color: var(--blue); font-size: 13px; font-family: inherit; cursor: pointer; font-weight: 500; }
  .parse-btn:hover { background: #d0e8f8; }
  .parse-result { margin-top: 10px; font-size: 12px; padding: 8px 12px; border-radius: var(--radius); display: none; }
  .parse-result.ok { background: var(--green-bg); color: var(--green); display: block; }
  .parse-result.err { background: var(--red-bg); color: var(--red); display: block; }

  @media (max-width: 540px) {
    .stats { grid-template-columns: repeat(2,1fr); }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Bark.com Lead Scorer</h1>
    <p>Paste your Bark leads below — automatic scoring applied instantly</p>
  </header>

  <div class="mode-toggle">
    <span>Scoring mode:</span>
    <button class="mb active" id="mb-basic" onclick="setMode('basic')">Basic (before spending)</button>
    <button class="mb" id="mb-revenue" onclick="setMode('revenue')">Revenue potential</button>
  </div>

  <details class="scoring-ref" id="scoring-ref">
    <summary>Scoring reference ▾</summary>
    <table class="ref-table" id="ref-table"></table>
    <div class="rules" id="ref-rules"></div>
  </details>

  <div class="stats">
    <div class="stat"><div class="num" id="s-total">0</div><div class="lbl">Total leads</div></div>
    <div class="stat buy"><div class="num" id="s-buy">0</div><div class="lbl" id="lbl-buy">Buy</div></div>
    <div class="stat review"><div class="num" id="s-review">0</div><div class="lbl" id="lbl-review">Consider</div></div>
    <div class="stat skip"><div class="num" id="s-skip">0</div><div class="lbl">Skip</div></div>
  </div>

  <div class="filters">
    <button class="fb active-all" onclick="setFilter('all')">All leads</button>
    <button class="fb" id="fb-buy" onclick="setFilter('buy')"></button>
    <button class="fb" id="fb-review" onclick="setFilter('review')"></button>
    <button class="fb" id="fb-skip" onclick="setFilter('skip')">✕ Skip</button>
  </div>

  <div class="leads" id="leads-wrap"></div>

  <!-- Paste section -->
  <div class="paste-card">
    <h2>📋 Paste a Bark lead</h2>
    <p>Copy the lead text from Bark.com and paste it below — it will be parsed and scored automatically</p>
    <textarea id="paste-area" placeholder="Robert
3h ago
Social Media Marketing
Irvington, NJ, 07111 (Nationwide)
..."></textarea>
    <button class="parse-btn" onclick="parsePaste()">Score this lead →</button>
    <div class="parse-result" id="parse-result"></div>
  </div>

</div>

<script>
// ── Scoring configs ──────────────────────────────────────────────
const MODES = {
  basic: {
    label: 'Basic (before spending)',
    factors: {
      budget:   { label: 'Budget > $3k',        score: 3 },
      biz:      { label: 'Business established', score: 3 },
      urgent:   { label: 'Urgent project',       score: 2 },
      clear:    { label: 'Clear requirements',   score: 2 },
      decision: { label: 'Decision maker',       score: 3 },
      cheap:    { label: 'Cheap wording',        score: -5, negative: true },
    },
    tiers: [
      { min: 8,  cat: 'buy',    label: 'Buy lead',  badge: '✓ Buy this lead' },
      { min: 5,  cat: 'review', label: 'Consider',  badge: '~ Consider' },
      { min: -99,cat: 'skip',   label: 'Skip',      badge: '✕ Skip' },
    ],
    rules: '8+ → Buy | 5–7 → Consider | Below 5 → Skip'
  },
  revenue: {
    label: 'Revenue potential',
    factors: {
      budget5k: { label: 'Budget $5k+',       score: 8 },
      budget3k: { label: 'Budget $3k+',       score: 5 },
      biz:      { label: 'Existing business', score: 5 },
      ecomm:    { label: 'E-commerce',        score: 4 },
      urgent:   { label: 'Urgent',            score: 3 },
      cheap:    { label: 'Cheap wording',     score: -8, negative: true },
    },
    tiers: [
      { min: 12, cat: 'buy',    label: 'Buy Immediately', badge: '✓ Buy Immediately' },
      { min: 8,  cat: 'review', label: 'Review',          badge: '~ Review' },
      { min: -99,cat: 'skip',   label: 'Skip',            badge: '✕ Skip' },
    ],
    rules: '12+ → Buy Immediately | 8–11 → Review | Below 8 → Skip'
  }
};

let mode = 'basic';
let filter = 'all';
let leads = [];

// ── Helpers ──────────────────────────────────────────────────────
function getMode() { return MODES[mode]; }

function scoreLead(factors, lmode) {
  const m = MODES[lmode || mode];
  let s = 0;
  factors.forEach(f => s += (m.factors[f]?.score || 0));
  return s;
}

function getCategory(score, lmode) {
  const tiers = MODES[lmode || mode].tiers;
  for (const t of tiers) { if (score >= t.min) return t; }
  return tiers[tiers.length - 1];
}

function getCat(score, lmode) { return getCategory(score, lmode).cat; }
function getBadge(score, lmode) { return getCategory(score, lmode).badge; }

// ── Parse pasted Bark lead ───────────────────────────────────────
function parsePaste() {
  const text = document.getElementById('paste-area').value.trim();
  const res = document.getElementById('parse-result');
  if (!text) { res.className = 'parse-result err'; res.textContent = 'Please paste some lead text first'; return; }

  // Extract name (first line)
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const name = lines[0] || 'Unknown';

  // Extract service (second non-time line)
  let service = '';
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].match(/^\d+[mh] ago$/) && !lines[i].startsWith('http') && lines[i].length < 60) {
      service = lines[i]; break;
    }
  }

  const t = text.toLowerCase();
  const factors = [];

  // Budget detection
  const budgetMatch = t.match(/\$([0-9,]+)\s*[-–]\s*\$?([0-9,]+)|budget[:\s]*\$?([0-9,]+)/);
  let budgetVal = 0;
  if (budgetMatch) {
    const raw = (budgetMatch[1] || budgetMatch[3] || '0').replace(/,/g, '');
    budgetVal = parseInt(raw) || 0;
  }
  if (t.includes('5,000') || t.includes('$5k') || t.includes('5k+') || budgetVal >= 5000) {
    if (mode === 'revenue') factors.push('budget5k');
    else factors.push('budget');
  } else if (t.includes('3,000') || t.includes('$3k') || t.includes('3k+') || budgetVal >= 3000) {
    if (mode === 'revenue') factors.push('budget3k');
    else factors.push('budget');
  }

  // Business
  if (t.includes('small business') || t.includes('existing business') || t.includes('established') ||
      t.includes('my business') || t.includes('our business') || t.includes('company')) {
    factors.push('biz');
  }

  // Urgent
  if (t.includes('urgent') || t.includes('as soon as possible') || t.includes('asap') ||
      t.includes('immediately') || t.includes('contact urgently')) {
    factors.push('urgent');
  }

  // Clear requirements / decision maker (basic mode)
  if (mode === 'basic') {
    if (t.includes('ready to hire') || t.includes('definitely going to hire') ||
        t.includes('ready to make') || t.includes('i\'m ready')) {
      factors.push('decision');
    }
    const hasSpecifics = lines.filter(l => l.includes('?')).length >= 3;
    if (hasSpecifics) factors.push('clear');
  }

  // E-commerce (revenue mode)
  if (mode === 'revenue' && (t.includes('e-commerce') || t.includes('ecommerce') ||
      t.includes('online store') || t.includes('shopify'))) {
    factors.push('ecomm');
  }

  // Cheap wording
  const cheapWords = ['cheap','cheapest','lowest price','budget friendly','affordable','best price','low cost','inexpensive','not spend much','minimum budget'];
  if (cheapWords.some(w => t.includes(w))) {
    factors.push('cheap');
  }

  leads.unshift({ name, service: service || 'Unknown', factors, mode });
  document.getElementById('paste-area').value = '';

  const score = scoreLead(factors, mode);
  const cat = getCat(score, mode);
  res.className = 'parse-result ok';
  res.textContent = `✓ "${name}" added — Score: ${score >= 0 ? '+' : ''}${score} → ${getBadge(score, mode)}`;
  render();
}

// ── Mode switch ──────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.getElementById('mb-basic').className = 'mb' + (m === 'basic' ? ' active' : '');
  document.getElementById('mb-revenue').className = 'mb' + (m === 'revenue' ? ' active' : '');
  updateRef();
  updateFilterLabels();
  render();
}

function updateRef() {
  const cfg = getMode();
  let rows = '';
  Object.values(cfg.factors).forEach(f => {
    const cls = f.score < 0 ? 'neg-score' : 'pos-score';
    const sign = f.score > 0 ? '+' : '';
    rows += `<tr><td>${f.label}</td><td class="${cls}">${sign}${f.score}</td></tr>`;
  });
  document.getElementById('ref-table').innerHTML = rows;
  document.getElementById('ref-rules').innerHTML = cfg.rules.split('|').map(r => {
    const [score, action] = r.split('→').map(s => s.trim());
    const color = action.toLowerCase().includes('buy') ? 'var(--green)' : action.toLowerCase().includes('skip') ? 'var(--red)' : 'var(--amber)';
    return `<div style="display:flex;align-items:center;gap:6px"><span style="color:${color};font-weight:700">●</span> ${score} → <strong>${action}</strong></div>`;
  }).join('');
}

function updateFilterLabels() {
  const tiers = getMode().tiers;
  const buyTier = tiers[0];
  const reviewTier = tiers[1];
  document.getElementById('fb-buy').textContent = '✓ ' + buyTier.label;
  document.getElementById('fb-review').textContent = '~ ' + reviewTier.label;
  document.getElementById('lbl-buy').textContent = buyTier.label;
  document.getElementById('lbl-review').textContent = reviewTier.label;
}

// ── Init ─────────────────────────────────────────────────────────
updateRef();
updateFilterLabels();
render();

// ── Filter ───────────────────────────────────────────────────────
function setFilter(f) {
  filter = f;
  document.querySelectorAll('.fb').forEach(b => b.className = 'fb');
  const map = { all: 'active-all', buy: 'active-buy', review: 'active-review', skip: 'active-skip' };
  if (f === 'all') document.querySelector('.fb').classList.add(map[f]);
  else document.getElementById('fb-' + f)?.classList.add(map[f]);
  render();
}

// ── Render ───────────────────────────────────────────────────────
function render() {
  const wrap = document.getElementById('leads-wrap');
  const filtered = leads.filter(l => {
    const s = scoreLead(l.factors, l.mode);
    const cat = getCat(s, l.mode);
    return filter === 'all' || cat === filter;
  });

  if (filtered.length === 0) {
    wrap.innerHTML = '<div class="empty">No leads in this category</div>';
  } else {
    wrap.innerHTML = filtered.map(l => {
      const m = MODES[l.mode];
      const score = scoreLead(l.factors, l.mode);
      const cat = getCat(score, l.mode);
      const badge = getBadge(score, l.mode);
      const ftags = l.factors.map(f => {
        const isNeg = m.factors[f]?.negative;
        return `<span class="ftag ${isNeg ? 'neg' : 'pos'}">${m.factors[f]?.label || f}</span>`;
      }).join('');
      const modeTag = l.mode !== mode ? `<span class="ftag" style="background:#e8e8ff;color:#3a35b0;border-color:#a09de0">${m.label}</span>` : '';
      return `<div class="lead-card ${cat}">
        <div class="lead-top">
          <div>
            <div class="lead-name">${l.name}</div>
            <div class="lead-meta">${l.service}</div>
          </div>
          <span class="badge ${cat}">${badge}</span>
        </div>
        <div class="factors">${ftags}${modeTag}</div>
        <div class="lead-bottom">
          <span class="score-label">Score</span>
          <span class="score-val ${cat}">${score >= 0 ? '+' : ''}${score}</span>
        </div>
      </div>`;
    }).join('');
  }

  const counts = { buy: 0, review: 0, skip: 0 };
  leads.forEach(l => {
    const s = scoreLead(l.factors, l.mode);
    counts[getCat(s, l.mode)]++;
  });
  document.getElementById('s-total').textContent = leads.length;
  document.getElementById('s-buy').textContent = counts.buy;
  document.getElementById('s-review').textContent = counts.review;
  document.getElementById('s-skip').textContent = counts.skip;
}

// ── Init ─────────────────────────────────────────────────────────
updateRef();
updateFilterLabels();
render();
</script>
</body>
</html>
